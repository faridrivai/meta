<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terima Kasih</title>
    <style>
        /* Reset dasar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* Background hitam pekat */
            color: #e0e0e0; /* Warna teks abu-abu terang agar tidak sakit di mata */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Wadah teks */
        .message-container {
            max-width: 600px;
            padding: 30px;
            text-align: center;
            line-height: 1.8;
            font-size: 1.2rem;
            font-weight: 300;
        }

        /* Jarak antar paragraf dan animasi muncul perlahan */
        .message-container p {
            margin-bottom: 25px;
            opacity: 0; /* Mulai dari tidak terlihat */
            transform: translateY(10px);
            animation: fadeIn 2s ease forwards;
        }

        /* Waktu kemunculan teks diatur berurutan */
        .message-container p:nth-child(1) { animation-delay: 1s; }
        .message-container p:nth-child(2) { animation-delay: 3s; }
        .message-container p:nth-child(3) { animation-delay: 5s; }
        .message-container p:nth-child(4) { 
            animation-delay: 7s; 
            margin-top: 50px; 
            font-weight: 600; 
            color: #ffffff; /* Teks terakhir lebih putih dan tebal */
            letter-spacing: 1px;
        }

        /* Animasi fade in */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            .message-container {
                font-size: 1rem;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="message-container">
        <p>Terimakasih untuk semuanya, gua belajar banyak dari lu.</p>
        
        <p>Gua terlalu cepat ngambil keputusan, gua sering mutusin hubungan, itu negatifnya gua.</p>
        
        <p>Untuk sekarang gua mau belajar untuk fokus ke diri gua dan menghilangkan sifat itu.</p>
        
        <p>Terimakasih atas semuanya, selamat tinggal.</p>
    </div>

</body>
</html>
